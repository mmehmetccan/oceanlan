<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Updater</title>
    <style>
        body {
            background-color: #2b2d31; /* Discord koyu gri */
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .logo-container {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            animation: bounce 2s infinite ease-in-out;
        }

        /* Eğer logonuz varsa buraya koyun, yoksa Discord tarzı bir kare döner */
        .logo {
            width: 100%;
            height: 100%;
            background-image: url('ms-icon-310x310.png'); /* Sizin ikonunuz */
            background-size: cover;
            border-radius: 20px;
        }

        .status {
            font-size: 14px;
            font-weight: 600;
            color: #dbdee1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }

        /* Basit bir animasyon */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="logo"></div>
    </div>
    <div id="status-text" class="status">Checking for updates...</div>

    <script>
        const { ipcRenderer } = require('electron');

        // Main process'ten gelen mesajları dinle (Yazıyı değiştirmek için)
        ipcRenderer.on('message', (event, text) => {
            document.getElementById('status-text').innerText = text;
        });
    </script>
</body>
</html>
