<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OceanLan Updater</title>
    <style>
        body {
            background-color: #2f3136;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            -webkit-app-region: drag; /* Pencereyi sürükleyebilmek için */
        }
        .logo {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            /* Logonun yolu buraya. Eğer aynı klasördeyse direkt ismini yaz */
            background-image: url('ms-icon-310x310.png');
            background-size: cover;
            border-radius: 20px;
        }
        h2 { font-size: 20px; margin-bottom: 10px; font-weight: 600; }
        #status { font-size: 13px; color: #b9bbbe; margin-bottom: 20px; }

        .progress-container {
            width: 80%;
            height: 6px;
            background-color: #202225;
            border-radius: 3px;
            overflow: hidden;
            display: none; /* Başlangıçta gizli */
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: #5865F2; /* Discord/OceanLan mavisi */
            transition: width 0.2s;
        }
    </style>
</head>
<body>
    <div class="logo"></div>
    <h2 id="title">OceanLan</h2>
    <p id="status">Güncellemeler denetleniyor...</p>

    <div class="progress-container" id="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        // Main process'ten gelen mesajları dinle
        ipcRenderer.on('message', (event, text) => {
            document.getElementById('status').innerText = text;
        });

        // İndirme yüzdesini dinle
        ipcRenderer.on('download-progress', (event, percent) => {
            document.getElementById('status').innerText = `%${Math.round(percent)} indiriliyor...`;
            document.getElementById('progress-container').style.display = 'block';
            document.getElementById('progress-bar').style.width = percent + '%';
        });
    </script>
</body>
</html>
